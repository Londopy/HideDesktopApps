name: Build & Release

# Fires when a version tag is pushed: git tag v1.2.3 && git push --tags
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create release + upload assets

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build one binary per target ──────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            label: x64
          - target: i686-pc-windows-msvc
            label: x86
          - target: aarch64-pc-windows-msvc
            label: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create portable ZIP + SHA-256
        shell: pwsh
        run: |
          $ver  = "${{ github.ref_name }}"
          $lbl  = "${{ matrix.label }}"
          $exe  = "target\${{ matrix.target }}\release\HideDesktopApps.exe"
          $zip  = "HideDesktopApps-$ver-$lbl-portable.zip"

          Compress-Archive -Path $exe -DestinationPath $zip

          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          "$hash  $zip" | Set-Content "$zip.sha256"

          echo "ZIP=$zip"        >> $env:GITHUB_ENV
          echo "SHA256=$hash"    >> $env:GITHUB_ENV

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portable-${{ matrix.label }}
          path: |
            HideDesktopApps-*-${{ matrix.label }}-portable.zip
            HideDesktopApps-*-${{ matrix.label }}-portable.zip.sha256
          retention-days: 1

  # ── Installer (x64 only, needs Inno Setup) ───────────────────────────────────
  installer:
    name: Build installer (x64)
    runs-on: windows-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-x64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-x64-cargo-

      - name: Build x64 binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart("v")
          New-Item -ItemType Directory -Force -Path installer-output | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$ver assets\installer.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed" }

      - name: SHA-256 for installer
        shell: pwsh
        run: |
          $file = Get-ChildItem installer-output\*.exe | Select-Object -First 1
          $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLower()
          "$hash  $($file.Name)" | Set-Content "$($file.FullName).sha256"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-x64
          path: |
            installer-output\*.exe
            installer-output\*.sha256
          retention-days: 1

  # ── Publish GitHub Release ───────────────────────────────────────────────────
  release:
    name: Publish release
    runs-on: windows-latest
    needs: [build, installer]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect release files
        shell: pwsh
        run: |
          # Flatten into dist/
          Get-ChildItem dist -Recurse -File | Move-Item -Destination dist -Force
          Remove-Item dist\* -Recurse -Include portable-*, installer-x64 -Force -ErrorAction SilentlyContinue

          # Consolidate all .sha256 sidecars into a single SHA256SUMS.txt
          $lines = Get-ChildItem dist\*.sha256 | Sort-Object Name | ForEach-Object { Get-Content $_.FullName }
          $lines | Set-Content dist\SHA256SUMS.txt -Encoding utf8NoBOM
          Remove-Item dist\*.sha256 -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "HideDesktopApps ${{ github.ref_name }}"
          body: |
            ## Install

            **Installer (recommended)**
            Download `HideDesktopApps-${{ github.ref_name }}-x64-setup.exe` and run it.

            **Scoop**
            ```
            scoop bucket add HideDesktopApps https://github.com/Londopy/HideDesktopApps
            scoop install HideDesktopApps
            ```

            **WinGet**
            ```
            winget install Londopy.HideDesktopApps
            ```

            **Portable ZIP**
            Download the ZIP for your architecture, extract, and run `HideDesktopApps.exe`.

            ---
            SHA-256 checksums for all downloads are in `SHA256SUMS.txt`.
          files: |
            dist/*.exe
            dist/*.zip
            dist/SHA256SUMS.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── Update Scoop manifest hash ────────────────────────────────────────────────
  scoop:
    name: Update Scoop manifest
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download x64 portable checksum
        uses: actions/download-artifact@v4
        with:
          name: portable-x64
          path: dist

      - name: Patch manifest hash + version
        shell: bash
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          SHA=$(cut -d' ' -f1 dist/*x64-portable.zip.sha256)

          # Update version and hash in the manifest
          sed -i "s/\"version\": \".*\"/\"version\": \"$VER\"/" scoop/HideDesktopApps.json
          sed -i "s/\"hash\": \".*\"/\"hash\": \"$SHA\"/" scoop/HideDesktopApps.json

      - name: Push updated manifest
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -b scoop-update origin/main
          git add scoop/HideDesktopApps.json
          if git diff --staged --quiet; then
            echo "No manifest changes to commit."
          else
            git commit -m "chore: update Scoop manifest to ${{ github.ref_name }}"
            git push origin scoop-update:main
          fi

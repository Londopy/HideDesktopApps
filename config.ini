# HideDesktopApps configuration
# Hotkey modifiers: ctrl, alt, shift, win  (combine with +)
# Hotkey key: any single letter A-Z

[hotkey]
modifiers = ctrl+alt
key = h

[hotkey_windows]
modifiers = ctrl+alt
key = w

[hotkey_taskbar]
modifiers = ctrl+alt
key = t

[startup]
run_at_startup = true
delay = 2

[defaults]
icons_hidden = true

